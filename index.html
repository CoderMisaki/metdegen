<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meteora Alpha Terminal | Masako Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Meteora Alpha Terminal</h1>
      <p>Powered by Masako Intelligence Engine</p>
    </header>

    <section class="controls glass">
      <input id="searchInput" class="search-input" placeholder="Cari token CA atau ticker..." />
      <button id="searchBtn">Cari</button>
      <button id="btnMeteora" class="active">💧 Meteora DLMM</button>
      <button id="btnAlpha">🎯 Signal Alpha</button>
    </section>

    <div id="statusArea" class="status-area">Memuat data...</div>
    <section id="poolList" class="list"></section>
  </main>

  <div id="analysisModal" class="modal-overlay">
    <div class="modal glass">
      <button id="closeModal">✕</button>
      <h3 id="modalTitle">Analisis Token</h3>
      <pre id="modalBody"></pre>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
